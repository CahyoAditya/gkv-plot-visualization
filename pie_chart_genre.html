<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/favicon.png" type="image/png">
  <title>Video Game Sales - Genre Donut</title>
  <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>

<body style="margin: 0; min-height: 100vh; background: radial-gradient(circle at top, #1f2a44 0%, #0b1020 48%, #050816 100%); font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">
  <div style="max-width: 1200px; margin: 0 auto; padding: 32px 20px 40px;">
    <div style="margin-bottom: 18px; color: #d7def7;">
      <div style="font-size: 13px; letter-spacing: 0.24em; text-transform: uppercase; color: #7fb4ff;">Grafika Komputer dan Visualisasi</div>
      <h1 style="margin: 10px 0 6px; font-size: clamp(2rem, 4vw, 3.4rem); line-height: 1.02; font-weight: 700; color: #f7f9ff;">Video Game Sales by Genre</h1>
      <p style="margin: 0; max-width: 680px; font-size: 15px; line-height: 1.6; color: #aab4d6;">(1980 - 2024)</p>
    </div>
    <div style="display: grid; gap: 22px;">
      <div id="donutplot" style="width: 100%; height: 720px; border-radius: 28px; background: rgba(9, 14, 31, 0.72); box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45); backdrop-filter: blur(14px); border: 1px solid rgba(135, 164, 255, 0.16);"></div>
      <div id="correlationplot" style="width: 100%; height: 620px; border-radius: 28px; background: rgba(9, 14, 31, 0.72); box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45); backdrop-filter: blur(14px); border: 1px solid rgba(135, 164, 255, 0.16);"></div>
    </div>
  </div>

  <script src="donut.js"></script>

</body>

</html>
